# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Projects Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Projects Metric
      - name: Projects Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: projects.svg
          token: ${{ secrets.METRICS_TOKEN }}

          plugin_screenshot: yes
          plugin_screenshot_background: yes
          plugin_screenshot_mode: image
          plugin_screenshot_selector: body
          plugin_screenshot_title: Recent Project
          plugin_screenshot_url: https://portfolio-mocha-alpha-98.vercel.app
          plugin_screenshot_viewport: '{"width": 1280, "height": 1280}'
